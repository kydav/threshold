name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      disable_paywall:
        description: 'Disable paywall (for beta builds)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode Firebase config files
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=../release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release AAB
        run: |
          DART_DEFINES=""
          if [ "${{ inputs.disable_paywall }}" = "true" ]; then
            DART_DEFINES="--dart-define=PAYWALL_ENABLED=false"
          fi
          flutter build appbundle --release --build-number=${{ github.run_number }} $DART_DEFINES

      - name: Build release APK
        run: |
          DART_DEFINES=""
          if [ "${{ inputs.disable_paywall }}" = "true" ]; then
            DART_DEFINES="--dart-define=PAYWALL_ENABLED=false"
          fi
          flutter build apk --release --build-number=${{ github.run_number }} $DART_DEFINES

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.auaha.threshold
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal
