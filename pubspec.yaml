name: threshold
description: Mobile-first buyer representation agreement tool for real estate agents.
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  cloud_firestore: ^5.6.12
  cloud_functions: ^5.3.0
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.5.3
  firebase_core: ^3.13.1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  hooks_riverpod: ^2.6.1
  http: ^1.4.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  syncfusion_flutter_pdf: ^28.2.7
  syncfusion_flutter_signaturepad: ^28.2.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/forms/
    - assets/icon/

flutter_launcher_icons:
  # Android
  android: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0A1F6B"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

  # iOS — standard + dark + tinted
  ios: true
  remove_alpha_ios: true
  image_path_ios: "assets/icon/icon.png"
  ios_dark_image_path: "assets/icon/icon_dark.png"
  ios_tinted_image_path: "assets/icon/icon_tinted.png"
